name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - fn-*

jobs:
  guardrails:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install guardrail tools
        run: |
          set -euo pipefail
          brew install ripgrep

      - name: Enforce legacy DI/runtime guardrails
        run: |
          set -euo pipefail
          bash scripts/validate_legacy_runtime_guardrails.sh

      - name: Enforce Core Data codegen guardrails
        run: |
          set -euo pipefail
          bash scripts/validate_coredata_codegen_guardrails.sh

      - name: Enforce Life OS foundation guardrails
        run: bash scripts/phase1-foundation-guardrails.sh

      - name: Enforce V3 fail-closed runtime guardrails
        run: |
          set -euo pipefail
          rg -n "assertV3RuntimeReady|v3RuntimeReady|v3_runtime_not_ready" \
            "LifeBoard/AppDelegate.swift" \
            "LifeBoard/Presentation/DI/PresentationDependencyContainer.swift" \
            "LifeBoard/State/DI/EnhancedDependencyContainer.swift"

      - name: Enforce token-law guardrails on changed UI lines
        env:
          TOKEN_LAW_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: bash scripts/token-law-guardrails.sh

      - name: Install flowctl
        env:
          FLOWCTL_DOWNLOAD_URL: ${{ secrets.FLOWCTL_DOWNLOAD_URL }}
          FLOWCTL_DOWNLOAD_SHA256: ${{ secrets.FLOWCTL_DOWNLOAD_SHA256 }}
          FLOWCTL_ALLOW_SHIM: "0"
        run: bash scripts/install_flowctl.sh

      - name: Verify flowctl availability
        env:
          FLOWCTL_ALLOW_SHIM: "0"
        run: bash scripts/verify_flowctl.sh

  unit-tests:
    runs-on: macos-latest
    needs: guardrails
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [[ ! -d /Applications/Xcode_26.5.app ]]; then
            ls -1 /Applications
            echo "Xcode 26.5 is required for SwiftUI 26 APIs used by LifeBoard."
            exit 1
          fi
          sudo xcode-select -switch /Applications/Xcode_26.5.app
          xcodebuild -version

      - name: Run fast unit-test preflight
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace "LifeBoard.xcworkspace" \
            -scheme "LifeBoard" \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -only-testing:LifeBoardTests/TaskNotificationOrchestratorTests \
            -only-testing:LifeBoardTests/TaskSemanticRetrievalServiceTests \
            -only-testing:LifeBoardTests/TaskTagLinkUniquenessTests \
            -only-testing:LifeBoardTests/ThreadContextAttachmentTests \
            -only-testing:LifeBoardTests/TombstoneRetentionTests \
            -only-testing:LifeBoardTests/TypographyTokenTests \
            -only-testing:LifeBoardTests/V2PerformanceGateTests \
            -only-testing:LifeBoardTests/V2RepositoryInvariantTests \
            -only-testing:LifeBoardTests/XPCalculationEngineExactPreviewTests \
            -only-testing:LifeBoardTests/XPCalculationEngineWeeklyCategoryTests \
            -only-testing:LifeBoardTests/XPExactPreviewParityTests \
            -only-testing:LifeBoardTests/XPRewardPreviewCopyRegressionTests \
            test

      - name: Run full baseline-aware unit-test gate
        run: bash scripts/run-baseline-aware-tests.sh

  screenshot-smoke:
    runs-on: macos-latest
    needs: guardrails
    strategy:
      fail-fast: false
      matrix:
        device:
          - iPhone 17
          - iPad Pro 13-inch (M5)
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          set -euo pipefail
          sudo xcode-select -switch /Applications/Xcode_26.5.app
          xcodebuild -version

      - name: Run fail-closed screenshot flow
        run: |
          set -euo pipefail
          fixed_now="2026-07-13T10:00:00Z"
          python3 - "$fixed_now" <<'PY'
          import json, pathlib, sys
          pathlib.Path("/tmp/lifeboard-app-store-screenshot-config.json").write_text(json.dumps({
              "outputRoot": "/tmp/lifeboard-screenshot-smoke",
              "deviceSlug": "ci-smoke",
              "fixedNow": sys.argv[1],
          }) + "\n")
          PY
          xcodebuild test \
            -workspace "LifeBoard.xcworkspace" \
            -scheme "LifeBoard" \
            -destination 'platform=iOS Simulator,name=${{ matrix.device }}' \
            -only-testing:LifeBoardUITests/AppStoreScreenshotUITests/testCaptureExpandedAppStoreScreenshotSet

  perf-gate:
    runs-on: macos-latest
    needs: guardrails
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate deterministic read-model benchmark snapshot
        run: |
          set -euo pipefail
          swift scripts/perf_seed_v3.swift --tasks 20000 --occurrences 200000 --iterations 160 --output build/benchmarks/v2_readmodel.json
          cat build/benchmarks/v2_readmodel.json

      - name: Enforce balanced SLO thresholds
        run: |
          set -euo pipefail
          swift - <<'SWIFT'
          import Foundation

          struct Percentiles: Decodable {
              let p95_ms: Double
              let p99_ms: Double
          }

          struct Metrics: Decodable {
              let home: Percentiles
              let project: Percentiles
              let search: Percentiles
          }

          struct Snapshot: Decodable {
              let metrics: Metrics
          }

          let url = URL(fileURLWithPath: "build/benchmarks/v2_readmodel.json")
          let data = try Data(contentsOf: url)
          let snapshot = try JSONDecoder().decode(Snapshot.self, from: data)

          let failures: [String] = [
              snapshot.metrics.home.p95_ms > 250 ? "home p95 > 250ms" : nil,
              snapshot.metrics.project.p95_ms > 250 ? "project p95 > 250ms" : nil,
              snapshot.metrics.search.p95_ms > 300 ? "search p95 > 300ms" : nil,
              snapshot.metrics.home.p99_ms > 600 ? "home p99 > 600ms" : nil,
              snapshot.metrics.project.p99_ms > 600 ? "project p99 > 600ms" : nil,
              snapshot.metrics.search.p99_ms > 600 ? "search p99 > 600ms" : nil
          ].compactMap { $0 }

          if failures.isEmpty {
              print("Balanced SLO thresholds satisfied")
          } else {
              fputs("Balanced SLO gate failed: \(failures.joined(separator: ", "))\n", stderr)
              exit(1)
          }
          SWIFT

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2-readmodel-benchmarks
          path: build/benchmarks/v2_readmodel.json
