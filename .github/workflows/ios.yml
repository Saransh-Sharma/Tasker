name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - fn-*

jobs:
  guardrails:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce legacy DI/runtime guardrails
        run: |
          set -euo pipefail
          bash scripts/validate_legacy_runtime_guardrails.sh

      - name: Enforce V2 fail-closed runtime guardrails
        run: |
          set -euo pipefail
          rg -n "assertV2RuntimeReady|v2RuntimeReady|v2_runtime_not_ready" \
            "To Do List/AppDelegate.swift" \
            "To Do List/Presentation/DI/PresentationDependencyContainer.swift" \
            "To Do List/State/DI/EnhancedDependencyContainer.swift"

      - name: Install flowctl
        env:
          FLOWCTL_DOWNLOAD_URL: ${{ secrets.FLOWCTL_DOWNLOAD_URL }}
          FLOWCTL_DOWNLOAD_SHA256: ${{ secrets.FLOWCTL_DOWNLOAD_SHA256 }}
          FLOWCTL_ALLOW_SHIM: "0"
        run: |
          set -euo pipefail
          bash scripts/install_flowctl.sh

      - name: Verify flowctl availability
        env:
          FLOWCTL_ALLOW_SHIM: "0"
        run: |
          set -euo pipefail
          bash scripts/verify_flowctl.sh

  unit-tests:
    runs-on: macos-latest
    needs: guardrails
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Run Unit Tests
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace "Tasker.xcworkspace" \
            -scheme "To Do List" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:TaskerTests \
            test

  perf-gate:
    runs-on: macos-latest
    needs: guardrails
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate deterministic read-model benchmark snapshot
        run: |
          set -euo pipefail
          swift scripts/perf_seed_v2.swift --tasks 20000 --occurrences 200000 --iterations 160 --output build/benchmarks/v2_readmodel.json
          cat build/benchmarks/v2_readmodel.json

      - name: Enforce balanced SLO thresholds
        run: |
          set -euo pipefail
          swift - <<'SWIFT'
          import Foundation

          struct Percentiles: Decodable {
              let p95_ms: Double
              let p99_ms: Double
          }

          struct Metrics: Decodable {
              let home: Percentiles
              let project: Percentiles
              let search: Percentiles
          }

          struct Snapshot: Decodable {
              let metrics: Metrics
          }

          let url = URL(fileURLWithPath: "build/benchmarks/v2_readmodel.json")
          let data = try Data(contentsOf: url)
          let snapshot = try JSONDecoder().decode(Snapshot.self, from: data)

          let failures: [String] = [
              snapshot.metrics.home.p95_ms > 250 ? "home p95 > 250ms" : nil,
              snapshot.metrics.project.p95_ms > 250 ? "project p95 > 250ms" : nil,
              snapshot.metrics.search.p95_ms > 300 ? "search p95 > 300ms" : nil,
              snapshot.metrics.home.p99_ms > 600 ? "home p99 > 600ms" : nil,
              snapshot.metrics.project.p99_ms > 600 ? "project p99 > 600ms" : nil,
              snapshot.metrics.search.p99_ms > 600 ? "search p99 > 600ms" : nil
          ].compactMap { $0 }

          if failures.isEmpty {
              print("Balanced SLO thresholds satisfied")
          } else {
              fputs("Balanced SLO gate failed: \(failures.joined(separator: ", "))\n", stderr)
              exit(1)
          }
          SWIFT

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2-readmodel-benchmarks
          path: build/benchmarks/v2_readmodel.json
