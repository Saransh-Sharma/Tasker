included:
  - LifeBoard

excluded:
  - Pods
  - build
  - .flow
  - LifeBoard.xcodeproj
  - LifeBoard.xcworkspace

custom_rules:
  token_law_uicolor_constructor:
    name: "Token Law UIColor"
    regex: "\\bUIColor\\s*\\("
    included: "LifeBoard/(View|Views|ViewControllers|Presentation/Views|LLM/Views)/.*\\.swift"
    message: "Use token colors (`UIColor.lifeboard.*` / `Color.lifeboard`) instead of raw UIColor constructors in UI modules."
    severity: error

  token_law_font_system:
    name: "Token Law UIFont"
    regex: "UIFont\\.systemFont|\\.font\\(\\.system\\("
    included: "LifeBoard/(View|Views|ViewControllers|Presentation/Views|LLM/Views)/.*\\.swift"
    message: "Use typography tokens (`UIFont.lifeboard` / `Font.lifeboard`) instead of system fonts in UI modules."
    severity: error

  token_law_shadow_usage:
    name: "Token Law Shadow"
    regex: "layer\\.shadow(Color|Opacity|Offset|Radius|Path)|\\.shadow\\("
    included: "LifeBoard/(View|Views|ViewControllers|Presentation/Views|LLM/Views)/.*\\.swift"
    excluded:
      - "LifeBoard/View/LiquidGlass/LGBaseView.swift"
    message: "Use token elevation APIs (`applyLifeBoardElevation` / `.lifeboardElevation`) instead of ad-hoc shadows."
    severity: error

  no_direct_print:
    name: "No Direct Print"
    regex: "\\b(?:Swift\\.)?print\\s*\\("
    included: "LifeBoard/.*\\.swift"
    excluded:
      - "LifeBoard/.*Tests?/.*\\.swift"
    message: "Use LoggingService (`logWarning/logError/logFatal` or structured `log(...event...)`) instead of print()."
    severity: error
